services:

  # =========================
  # AIRFLOW (Celery ready)
  # =========================
  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow-webserver
    restart: always
    command: webserver
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@airflow-db:5432/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    depends_on:
      - airflow-db
      - redis
    networks:
      - finhouse-network
    
  airflow-scheduler:
    image: apache/airflow:2.9.3
    command: scheduler
    depends_on:
      - airflow-webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    networks:
      - finhouse-network

  airflow-worker:
    image: apache/airflow:2.9.3
    command: celery worker
    depends_on:
      - airflow-webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    networks:
      - finhouse-network

  airflow-flower:
    image: apache/airflow:2.9.3
    command: celery flower
    ports:
      - "5555:5555"
    depends_on:
      - airflow-webserver
    networks:
      - finhouse-network

  airflow-db:
    image: postgres:15
    container_name: airflow_db
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - finhouse-network

  redis:
    image: redis:7
    container_name: redis
    networks:
      - finhouse-network
  airflow-init:
    image: apache/airflow:2.9.3
    container_name: airflow-init
    depends_on:
      - airflow-db
      - redis
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@airflow-db:5432/airflow
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create \
      --username admin \
      --password admin \
      --firstname admin \
      --lastname admin \
      --role Admin \
      --email admin@example.com
      "
    restart: "no"
    networks:
    - finhouse-network
  # =========================
  # KAFKA (KRaft)
  # =========================
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - finhouse-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    depends_on:
      - kafka
    networks:
      - finhouse-network

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    ports:
      - "8086:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - finhouse-network

  # =========================
  # DATA STACK
  # =========================
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    networks:
      - finhouse-network

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: supersecretpassword
    volumes:
      - minio_data:/data
    networks:
      - finhouse-network

  # =========================
  # MONITORING
  # =========================
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - finhouse-network

  prometheus:
    image: prom/prometheus:v2.45.0
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - finhouse-network

  # =========================
  # BI
  # =========================
  metabase:
    image: metabase/metabase:v0.49.13
    ports:
      - "3000:3000"
    depends_on:
      - metabase-db
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: locnguyen110
      MB_DB_PASS: password
      MB_DB_HOST: metabase-db
    networks:
      - finhouse-network

  metabase-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: locnguyen110
      POSTGRES_PASSWORD: password
    volumes:
      - metabase_db_data:/var/lib/postgresql/data
    networks:
      - finhouse-network
# ===================== VOLUMES =====================
volumes:
  airflow_db_data:
  kafka_data:
  metabase_db_data:
  grafana_data:
  prometheus_data:
  clickhouse_data:
  minio_data:

# ===================== NETWORK =====================
networks:
  finhouse-network:
    driver: bridge